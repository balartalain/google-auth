<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autenticación</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f1f5f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 420px;
    min-height: 320px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .logo { font-size: 5rem; margin-bottom: .75rem; }
  h1 { font-size: 1.2rem; color: #1e293b; margin-bottom: .9rem; }
  #subtitle  {  color: #94a3b8; margin-bottom: 2rem; line-height: 24px; }
  #googleBtn { display: flex; justify-content: center; min-height: 44px; }
  .status {
    margin-top: 1rem;
    font-size: .8rem;
    color: #64748b;
    min-height: 1.2rem;
  }
  .status.success { color: #16a34a; font-weight: 700; }
  .status.error   { color: #dc2626; }
  .footer {
    margin-top: 10px;
    color: #94a3b8;    /* Equivale a text-slate-400 */
    font-size: 0.875rem; /* Equivale a text-sm (14px) */
    line-height: 1.25rem; /* text-sm también ajusta el interlineado */
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🔐</div>
  <h1 id="title"></h1>
  <div id="subtitle"></div>
  <div id="googleBtn"></div>
  <div class="status" id="status"></div>
  <div class="footer">Autenticación segura vía Google Workspace</div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  const GOOGLE_CLIENT_ID = '478848519153-0tklbkp5d7252099relj297632eka3qg.apps.googleusercontent.com';

  // Leer parámetros de la URL
  const params      = new URLSearchParams(window.location.search);
  const redirectUri = params.get('redirect_uri');
  const title       = params.get('title')    || 'Bienvenido a UAPA';
  const subtitle    = params.get('subtitle') || '';

  // Aplicar textos
  document.getElementById('title').textContent    = title;
  document.getElementById('subtitle').textContent = subtitle;

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  function handleCredentialResponse(response) {
    const token   = response.credential;
    const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));

    setStatus('✓ ' + payload.email + ' — redirigiendo...', 'success');

    if (redirectUri) {
      // Redirigir de vuelta a la app con el token en la URL
      const url = new URL(redirectUri);
      url.searchParams.set('token', token);
      url.searchParams.set('name',    payload.name);
      url.searchParams.set('email',   payload.email);
      url.searchParams.set('picture', payload.picture);
      setTimeout(() => window.location.href = url.toString(), 600);
    } else {
      setStatus('No se definió redirect_uri.', 'error');
    }
  }

  function initializeGoogle() {
    if (window.google && window.google.accounts && document.getElementById('googleBtn')) {
      window.google.accounts.id.initialize({
        client_id:             GOOGLE_CLIENT_ID,
        callback:              handleCredentialResponse,
        auto_select:           false,
        cancel_on_tap_outside: true,
      });

      window.google.accounts.id.renderButton(
        document.getElementById('googleBtn'),
        { theme: 'outline', size: 'large', width: 280, text: 'signin_with', shape: 'pill' }
      );
    } else {
      setTimeout(initializeGoogle, 200);
    }
  }

  initializeGoogle();
</script>
</body>
</html>
